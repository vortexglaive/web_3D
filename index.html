<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Dark background to make the model pop */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* Define the size and look of the viewer window */
        model-viewer {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            background-color: #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="goth_win.glb" 
        alt="A 3D model on the web" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
